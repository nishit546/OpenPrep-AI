version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: openprep_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=openprep
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - openprep_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openprep_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/openprep
      - JWT_SECRET=your_jwt_secret_here
      - GEMINI_API_KEY=your_gemini_api_key_here
      - NODE_ENV=production
    depends_on:
      - postgres
    networks:
      - openprep_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5000/api}
    container_name: openprep_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - openprep_net

volumes:
  pg_data:

networks:
  openprep_net:
    driver: bridge
