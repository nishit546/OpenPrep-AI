name: ❓ Question
description: Ask a question about setting up or using OpenPrep AI
title: "[QUESTION]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check the README, contributing guidelines, and existing discussions!
  - type: textarea
    id: query
    attributes:
      label: Your Question
      description: What are you trying to understand or configure?
      placeholder: Be as specific as possible so we can help...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Detail what you have tried or what files/commands you are working with.
    validations:
      required: false
  - type: checkboxes
    id: checklists
    attributes:
      label: Checklist
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
