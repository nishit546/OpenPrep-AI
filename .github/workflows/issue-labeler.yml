name: Issue Auto Labeler

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const title = context.payload.issue.title || '';
            const labels = [];

            const upper = title.toUpperCase();
            if (upper.includes('[BUG]')) labels.push('bug');
            else if (upper.includes('[FEATURE]')) labels.push('enhancement');
            else if (upper.includes('[DOCS]') || upper.includes('[DOCUMENTATION]')) labels.push('documentation');
            else if (upper.includes('[QUESTION]')) labels.push('question');

            const areaMap = {
              'Frontend': 'frontend',
              'Backend': 'backend',
              'Database': 'database',
              'Authentication': 'authentication',
              'AI': 'ai',
              'UI/UX': 'ui/ux',
              'PYQ Analysis': 'pyq-analysis',
              'Study Planner': 'study-planner',
              'Dashboard': 'dashboard'
            };

            for (const [area, label] of Object.entries(areaMap)) {
              const re = new RegExp(
                '-\\s*\\[x\\]\\s*' + area.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'),
                'im'
              );
              if (re.test(body)) labels.push(label);
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [...new Set(labels)]
              });
            }
