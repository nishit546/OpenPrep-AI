name: PR Validation

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const missing = [];

            const title = (pr.title || '').trim();
            if (!title) {
              missing.push('**PR Title** is missing or empty.');
            }

            const body = (pr.body || '').trim();
            const stripped = body.replace(/[\s\r\n]+/g, '');
            if (stripped.length < 10) {
              missing.push('**PR Description** is missing or too short (minimum 10 characters).');
            }

            const issueRefs = [
              /(?:close|fix|resolve|related\s+to|ref|implement|address)\s*#\s*\d+/i,
              /(?:closes|fixes|resolves|implements|addresses)\s*#\s*\d+/i,
              /issue\s*[#:]\s*\d+/i
            ];
            const hasRef = issueRefs.some(r => r.test(body));
            if (!hasRef) {
              missing.push('**Related Issue** is not referenced. Use `Fixes #123`, `Closes #123`, or `Related to #123` in the description.');
            }

            if (missing.length > 0) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## \u26A0\uFE0F PR Checklist Incomplete\n\nThank you for your contribution! Please update your PR to include:\n\n' +
                  missing.map(m => '- ' + m).join('\n')
              });
            }
